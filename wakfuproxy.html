<!DOCTYPE html>
<html>
<head>
  <title>Simple Loader</title>
  <style>
    body {
      margin: 0;
      font-family: sans-serif;
    }

    .bar {
      display: flex;
      padding: 10px;
      background: #111;
    }

    input {
      flex: 1;
      padding: 8px;
      border: none;
      outline: none;
    }

    button {
      padding: 8px 12px;
      cursor: pointer;
    }

    iframe {
      width: 100%;
      height: calc(100vh - 50px);
      border: none;
    }
  </style>
</head>
<body>

<div class="bar">
  <input id="url" placeholder="Enter URL..." />
  <button onclick="loadSite()">Go</button>
</div>

<iframe id="viewer"></iframe>

<script>
function loadSite() {
  let url = document.getElementById("url").value.trim();

  if (!url) return;

  if (!url.startsWith("http://") && !url.startsWith("https://")) {
    url = "https://" + url;
  }

  document.getElementById("viewer").src = url;
}
/* Leave Warning */ window.addEventListener("beforeunload", function (e) { e.preventDefault(); e.returnValue = ""; }); 

</script>

</body>
</html>
